services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: desafio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - desafio-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: appdb
      JWT_SECRET: supersecret
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - desafio-network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafio-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000/api
    ports:
      - "5173:3000"
    networks:
      - desafio-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  desafio-network:
    driver: bridge
