services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: desafio-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - desafio-network-dev

volumes:
  postgres_data_dev:
    driver: local

networks:
  desafio-network-dev:
    driver: bridge
